openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Pulse Memo Pro API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: memos
    description: URL memo operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /memos:
    get:
      operationId: getMemos
      tags: [memos]
      summary: Get all memos
      description: Returns all saved URL memos
      responses:
        "200":
          description: List of memos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Memo"
    post:
      operationId: createMemo
      tags: [memos]
      summary: Create a new memo
      description: Save a new URL with context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoInput"
      responses:
        "201":
          description: Created memo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memo"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /memos/{id}:
    delete:
      operationId: deleteMemo
      tags: [memos]
      summary: Delete a memo
      description: Delete a saved URL memo by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Memo not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Memo:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        title:
          type: string
        context:
          type: string
        favicon:
          type: string
        createdAt:
          type: string
      required:
        - id
        - url
        - title
        - context
        - createdAt
    CreateMemoInput:
      type: object
      properties:
        url:
          type: string
        context:
          type: string
      required:
        - url
        - context
    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
